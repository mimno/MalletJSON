name: Release

on:
  release:
    types: [created]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build fat JAR for Mallet 2.0.8
        run: mvn --no-transfer-progress package -P mallet-208

      - name: Build fat JAR for Mallet 2.1+
        run: mvn --no-transfer-progress package -P mallet-21

      - name: Upload fat JARs to release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            target/mallet-json-*-fat-208.jar \
            target/mallet-json-*-fat-21.jar
        env:
          GH_TOKEN: ${{ github.token }}
